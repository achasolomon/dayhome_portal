services:
  postgres:
    image: postgres:15
    container_name: spiced-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: spiced_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: spiced-redis
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  postgres_data: